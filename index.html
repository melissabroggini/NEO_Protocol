<!DOCTYPE html>
<html class="dark" lang="en">

<head>

                        "on-primary-fixed-variant": "#e1e2ec",
                        "on-primary-container": "#000000",
                        "on-background": "#e2e2e2",

                        "inverse-surface": "#e2e2e2",

                        "outline": "#919191",

                        "outline-variant": "#474747",
                        "surface-container-highest": "#353535",
                        "tertiary": "#e4e2e6",
                        "error-container": "#93000a",
                        "tertiary-container": "#919094",

    <style>
        body {
            background-color: #131313;
            color: #e2e2e2;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }

</head>

<body class="bg-surface selection:bg-primary selection:text-on-primary overflow-x-hidden">
    <header class="fixed top-0 w-full z-50 bg-transparent flex justify-between items-center px-8 md:px-24 py-6">
        <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-white" data-icon="language">language</span>
            <span class="text-xl font-bold tracking-[2px] text-white font-['Space_Grotesk'] uppercase">NEO
                PROTOCOL</span>
        </div>
    </header>
    <main class="relative min-h-screen flex flex-col">
        <section class="relative h-screen w-full overflow-hidden flex items-center px-8 md:px-24">
            <div class="absolute inset-0 z-0 bg-[#0a0a0a]" id="landing-3d-bg">
                <div class="absolute inset-0 bg-black/40 pointer-events-none z-10"></div>
            </div>
            <div class="relative z-10 max-w-4xl pt-20">
                <div class="mb-4">
                    <p class="text-xs tracking-[2px] text-primary font-['Inter'] uppercase">Near earth objects
                        simulator</p>
                </div>
                <h1
                    class="text-white font-['Space_Grotesk'] text-5xl md:text-[3.5rem] font-bold leading-tight tracking-[1.17px] uppercase">
                    NEO PROTOCOL
                </h1>
                <p
                    class="mt-4 text-on-surface-variant font-['Inter'] text-base md:text-lg tracking-[0.96px] uppercase max-w-xl">
                    Explore the cosmic neighborhood through an interactive 3D simulation that tracks real-time NASA data
                    to monitor asteroids around the Earth.
                </p>
                <div class="mt-12 flex flex-col sm:flex-row gap-6">
                    <button onclick="localStorage.setItem('hasVisited', 'true'); window.location.href='app/app.html'"
                        class="px-10 py-4 border border-primary rounded-xl text-white font-['Inter'] text-[0.75rem] font-semibold tracking-[1.17px] uppercase hover:bg-on-surface hover:text-on-primary transition-none">
                        INITIALIZE SIMULATION
                    </button>
                </div>
            </div>
            <div class="absolute bottom-10 right-10 text-right hidden md:block py-4">
                <div class="text-[0.65rem] text-outline uppercase tracking-[2px] mb-2 font-['Inter']">Melissa Broggini
                </div>
                <div class="text-2xl font-['Space_Grotesk'] text-white">CV429.01 Media Interactions</div>
                <div class="mt-4 text-[0.65rem] text-outline uppercase tracking-[2px] font-['Inter']">Andrea Gysin,
                    Giovanni Profeta</div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script>
            (function () {
                const container = document.getElementById('landing-3d-bg');
                if (!container) return;

                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 10000);
                camera.position.set(0, 10, 150);
                camera.lookAt(0, 0, 0);

                const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setClearColor(0x050508, 1);
                renderer.toneMapping = THREE.ACESFilmicToneMapping;
                renderer.toneMappingExposure = 1.2;

                const canvas = renderer.domElement;
                canvas.style.position = 'absolute';
                canvas.style.top = '0';
                canvas.style.left = '0';
                canvas.style.width = '100%';
                canvas.style.height = '100%';
                container.insertBefore(canvas, container.firstChild);

                // --- LIGHTS (Boosted for better visibility) ---
                scene.add(new THREE.AmbientLight(0x223355, 1.0)); // Stronger ambient base

                const sunLight = new THREE.DirectionalLight(0xfff5e0, 9.0); // Intense sunlight
                sunLight.position.set(400, 400, 200);
                scene.add(sunLight);

                const rimLight = new THREE.DirectionalLight(0x4488ff, 3.5); // Brighter blue rim
                rimLight.position.set(-200, -100, -200);
                scene.add(rimLight);

                // Dedicated light for asteroids (increased intensity)
                const astLight = new THREE.PointLight(0xffffff, 3500, 800);
                astLight.position.set(-60, 40, 150);
                scene.add(astLight);

                // Dedicated light to make Earth pop
                const earthLight = new THREE.PointLight(0xffffff, 2500, 1000);
                earthLight.position.set(150, 0, 50);
                scene.add(earthLight);

                // --- EARTH ---
                const EARTH_R = 300;
                const textureLoader = new THREE.TextureLoader();
                textureLoader.setCrossOrigin('anonymous');
                const earthSpecular = textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_specular_2048.jpg');

                const earthGeo = new THREE.SphereGeometry(EARTH_R, 64, 64);
                const continentMat = new THREE.ShaderMaterial({
                    uniforms: { tSpecular: { value: earthSpecular }, color: { value: new THREE.Color(0xffffff) } },
                    vertexShader: 'varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }',
                    fragmentShader: 'uniform sampler2D tSpecular; uniform vec3 color; varying vec2 vUv; void main() { float ocean = texture2D(tSpecular, vUv).r; if (1.0 - ocean < 0.5) discard; gl_FragColor = vec4(color, 0.65); }',
                    transparent: true, side: THREE.DoubleSide
                });
                const earth = new THREE.Mesh(earthGeo, continentMat);
                earth.add(new THREE.Mesh(new THREE.SphereGeometry(EARTH_R * 1.005, 32, 32), new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.1 })));
                earth.add(new THREE.Mesh(new THREE.SphereGeometry(EARTH_R * 0.99, 32, 32), new THREE.MeshBasicMaterial({ color: 0x131313 })));

                earth.rotation.z = 23.5 * Math.PI / 180;
                earth.position.set(280, -50, -350);
                scene.add(earth);

                // --- DETERMINISTIC PROCEDURAL ASTEROIDS ---
                function createSeededAsteroidGeometry(baseRadius, seedData) {
                    const geometry = new THREE.IcosahedronGeometry(baseRadius, 8);
                    const pos = geometry.attributes.position;
                    const v = new THREE.Vector3();
                    const { stretchX, stretchY, stretchZ, noiseAmp, craters } = seedData;
                    for (let i = 0; i < pos.count; i++) {
                        v.fromBufferAttribute(pos, i);
                        const dir = v.clone().normalize();
                        let noise = 1.0 + (Math.sin(dir.x * 2.5 + dir.y * 3) * noiseAmp) + (Math.sin(dir.x * 8) * Math.cos(dir.z * 8) * 0.04);
                        craters.forEach(c => {
                            const dot = dir.dot(c.dir);
                            if (dot > 1.0 - c.size) {
                                const t = (dot - (1.0 - c.size)) / c.size;
                                noise -= Math.sin(t * Math.PI) * c.depth;
                            }
                        });
                        if (noise < 0.2) noise = 0.2;
                        pos.setXYZ(i, dir.x * baseRadius * noise * stretchX, dir.y * baseRadius * noise * stretchY, dir.z * baseRadius * noise * stretchZ);
                    }
                    geometry.computeVertexNormals();
                    return geometry;
                }

                const asteroids = [];
                const astProfiles = [
                    { // Main Red
                        r: 20, color: 0xBB1111, x: -55, y: 15, z: 60,
                        stretchX: 1.5, stretchY: 0.9, stretchZ: 1.2, noiseAmp: 0.22,
                        craters: [
                            { dir: new THREE.Vector3(0.5, -0.2, 0.4).normalize(), size: 0.3, depth: 0.25 },
                            { dir: new THREE.Vector3(-0.3, 0.6, -0.2).normalize(), size: 0.25, depth: 0.18 }
                        ],
                        rot: { x: 0.0003, y: 0.0004, z: 0.0002 }, speed: 0.6
                    },
                    { // Green 1
                        r: 8, color: 0x117733, x: -15, y: -20, z: 50,
                        stretchX: 1.1, stretchY: 1.2, stretchZ: 0.8, noiseAmp: 0.15,
                        craters: [{ dir: new THREE.Vector3(0.2, 0.8, 0.1).normalize(), size: 0.3, depth: 0.15 }],
                        rot: { x: 0.001, y: -0.0005, z: 0.0008 }, speed: 1.1
                    },
                    { // Green 2
                        r: 5, color: 0x117733, x: 15, y: 20, z: 35,
                        stretchX: 1.3, stretchY: 0.7, stretchZ: 1.1, noiseAmp: 0.12,
                        craters: [{ dir: new THREE.Vector3(-0.6, -0.2, 0.5).normalize(), size: 0.2, depth: 0.12 }],
                        rot: { x: -0.0008, y: 0.0012, z: -0.0004 }, speed: 0.8
                    },
                    { // Green 3
                        r: 7, color: 0x117733, x: 45, y: -8, z: 20,
                        stretchX: 0.9, stretchY: 0.9, stretchZ: 1.4, noiseAmp: 0.18,
                        craters: [{ dir: new THREE.Vector3(0.8, -0.3, -0.2).normalize(), size: 0.28, depth: 0.14 }],
                        rot: { x: 0.0005, y: 0.0006, z: 0.001 }, speed: 0.9
                    }
                ];

                astProfiles.forEach(p => {
                    const geo = createSeededAsteroidGeometry(p.r, p);
                    const mat = new THREE.MeshStandardMaterial({ color: p.color, roughness: 0.95, flatShading: true });
                    const ast = new THREE.Mesh(geo, mat);
                    ast.position.set(p.x, p.y, p.z);
                    ast.userData = { rot: p.rot, driftX: p.x, driftY: p.y, driftZ: p.z, speed: p.speed };
                    scene.add(ast);
                    asteroids.push(ast);
                });

                // --- STARFIELD ---
                const starPositions = new Float32Array(3000 * 3);
                for (let i = 0; i < 3000 * 3; i++) starPositions[i] = (Math.random() - 0.5) * 4000;
                const starGeo = new THREE.BufferGeometry();
                starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
                const starMat = new THREE.PointsMaterial({
                    color: 0xffffff,
                    size: 1.5,
                    transparent: true,
                    opacity: 0.9,
                    sizeAttenuation: true
                });
                scene.add(new THREE.Points(starGeo, starMat));

                // --- ANIMATE ---
                let t = 0;
                function animate() {
                    requestAnimationFrame(animate);
                    t += 0.0003;
                    earth.rotation.y += 0.0003;
                    asteroids.forEach(ast => {
                        ast.rotation.x += ast.userData.rot.x;
                        ast.rotation.y += ast.userData.rot.y;
                        ast.rotation.z += ast.userData.rot.z;
                        ast.position.x = ast.userData.driftX + Math.sin(t * ast.userData.speed) * 4;
                        ast.position.y = ast.userData.driftY + Math.cos(t * ast.userData.speed * 0.8) * 3;
                    });
                    camera.position.x = Math.sin(t * 0.4) * 6;
                    camera.position.y = 10 + Math.cos(t * 0.3) * 3;
                    camera.lookAt(0, 0, 0);
                    renderer.render(scene, camera);
                }
                animate();

                window.addEventListener('resize', () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                });
            })();
    </script>
</body>

</html>
