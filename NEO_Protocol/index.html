<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEO Protocol - Routing...</title>
    <style>
        body {
            background-color: #131313;
            color: #ffffff;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <p>Initializing Sequence...</p>
    <script>
        (function() {
            try {
                // Eseguiamo il routing immediatamente senza aspettare l'onload
                const hasVisited = localStorage.getItem('hasVisited') === 'true';
                const target = hasVisited ? 'app.html' : 'landing.html';
                
                // Usiamo location.replace per non salvare index.html nella cronologia
                window.location.replace(target);
            } catch (e) {
                console.error("Router error, falling back to landing:", e);
                window.location.href = 'landing.html';
            }
        })();
    </script>
</body>
</html>
