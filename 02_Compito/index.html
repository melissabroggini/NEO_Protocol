<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Satelliti 3D</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        #ui { position: absolute; color: white; padding: 15px; font-family: sans-serif; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">
        <b>Live Active Satellites</b><br>
        Visualizzazione basata su parametri Kepleriani<br>
        Trascina per ruotare, rotella per zoom.
    </div>

    <script>
        let earthTexture;
        let satellites = [];
        const MU = 398600.4418; // Costante gravitazionale terrestre (km^3/s^2)
        const EARTH_RADIUS_KM = 6371;
        const SCALE = 0.02; // Scala per adattare i km ai pixel di p5

        function preload() {
            const url = 'https://celestrak.org/NORAD/elements/gp.php?GROUP=active&FORMAT=json';
            loadJSON(url, (data) => {
                satellites = Object.values(data);
                console.log("Satelliti caricati:", satellites.length);
            });
            earthTexture = loadImage('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg');
        }

        function setup() {
            createCanvas(windowWidth, windowHeight, WEBGL);
            angleMode(DEGREES);
        }

        function draw() {
            background(10);
            orbitControl(); // Controllo camera

            // --- DISEGNO TERRA ---
            noStroke();
            fill(30, 60, 120);

            //sphere(EARTH_RADIUS_KM * SCALE);
            push();
            noStroke(); // Togliamo le linee della griglia sferica
            texture(earthTexture); // Applichiamo l'immagine della Terra
            sphere(EARTH_RADIUS_KM * SCALE, 50, 50); // Sfera ad alta definizione
            pop();  

            // Griglia equatoriale per riferimento
            noFill();
            stroke(255, 50);
            ellipse(0, 0, (EARTH_RADIUS_KM * 2) * SCALE);

            // --- DISEGNO SATELLITI ---
            strokeWeight(2);
            stroke(0, 255, 200);
            beginShape(POINTS);

            for (let sat of satellites) {
                let pos = getSatellitePosition(sat);
                if (pos) {
                    vertex(pos.x, pos.y, pos.z);
                }
            }
            endShape();
        }

        function getSatellitePosition(sat) {
            // 1. Estrazione parametri dal JSON
            let n = sat.MEAN_MOTION; // Revs al giorno
            let e = sat.ECCENTRICITY;
            let i = sat.INCLINATION;
            let raan = sat.RA_OF_ASC_NODE;
            let argP = sat.ARG_OF_PERICENTER;
            let M = sat.MEAN_ANOMALY;

            // 2. Calcolo Semi-asse maggiore (a)
            // n è in rev/day, convertiamo in radianti al secondo
            let n_rad_sec = (n * 2 * PI) / 86400;
            let a = Math.pow(MU / Math.pow(n_rad_sec, 2), 1/3);

            // 3. Risoluzione approssimativa dell'anomalia eccentrica (E)
            // Per semplicità usiamo l'approssimazione E = M se l'eccentricità è bassa
            let E = M; 

            // 4. Coordinate nel piano orbitale
            let x_orb = a * (cos(E) - e);
            let y_orb = a * (Math.sqrt(1 - e * e) * sin(E));

            // 5. Rotazione nello spazio 3D (Coordinate ECI)
            // Trasformiamo le coordinate del piano orbitale in coordinate 3D terrestri
            let x = (cos(raan) * cos(argP) - sin(raan) * sin(argP) * cos(i)) * x_orb +
                    (-cos(raan) * sin(argP) - sin(raan) * cos(argP) * cos(i)) * y_orb;
            
            let y = (sin(raan) * cos(argP) + cos(raan) * sin(argP) * cos(i)) * x_orb +
                    (-sin(raan) * sin(argP) + cos(raan) * cos(argP) * cos(i)) * y_orb;
            
            let z = (sin(argP) * sin(i)) * x_orb + (cos(argP) * sin(i)) * y_orb;

            // Applichiamo la scala per il canvas p5.js
            return {
                x: x * SCALE,
                y: -z * SCALE, // Invertiamo Z e Y per l'orientamento 3D di p5
                z: y * SCALE
            };
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</body>
</html>
