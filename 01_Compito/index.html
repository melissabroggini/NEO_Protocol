<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISS Tracker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background-color: #000; 
            color: white; 
            font-family: Helvetica, sans-serif; 
        }
        #ui-container { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            z-index: 10; 
            padding: 15px 25px; 
            border-radius: 8px;
        }
        h2 { margin-top: 0; color: #08d601; }
        .data { font-weight: bold; color: #08d601; }
        .hint { font-size: 0.85em; color: #ffffff; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="ui-container">
        <h2>ISS Tracker 3D</h2>
        <p>Latitudine: <span class="data" id="lat">Ricerca...</span></p>
        <p>Longitudine: <span class="data" id="lon">Ricerca...</span></p>
        <p class="hint">Trascina per ruotare</p>
    </div>

    <script>
        let earthTexture;
        let issData = null;
        const RAGGIO_TERRA = 200; 

        function preload() {
            // Carichiamo una mappa della Terra ad alta risoluzione da un server che permette il CORS
            earthTexture = loadImage('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg');
        }

        function setup() {
            // Inizializza il canvas in modalità WEBGL (3D)
            createCanvas(windowWidth, windowHeight, WEBGL);
            
            // Effettua la prima chiamata API
            fetchISS();
            // Aggiorna la posizione ogni 3 secondi
            setInterval(fetchISS, 3000);
        }

        function draw() {
            background(5, 5, 15); // Sfondo spazio scuro
            
            // orbitControl() permette di esplorare il 3D col mouse
            orbitControl();
          
            rotateY(millis() * 0.00005);

            // --- DISEGNO DELLA TERRA ---
            push();
            noStroke(); // Togliamo le linee della griglia sferica
            texture(earthTexture); // Applichiamo l'immagine della Terra
            sphere(RAGGIO_TERRA, 50, 50); // Sfera ad alta definizione
            pop();

            // --- DISEGNO DELLA ISS ---
            if (issData && issData.iss_position) {
                let lat = parseFloat(issData.iss_position.latitude);
                let lon = parseFloat(issData.iss_position.longitude);
                
                // Aggiorniamo i testi a schermo HTML
                document.getElementById('lat').innerText = lat.toFixed(4) + "°";
                document.getElementById('lon').innerText = lon.toFixed(4) + "°";

                push();
                // TRASFORMAZIONE COORDINATE (Sferiche -> Cartesiane 3D)
                // 1. Ruotiamo lungo l'asse Y per allinearci alla longitudine
                // (Aggiungiamo PI o un offset se la texture non ha il meridiano di Greenwich al centro esatto)
                rotateY(radians(lon) + PI); 
                
                // 2. Ruotiamo lungo l'asse X per allinearci alla latitudine
                rotateX(radians(-lat)); 
                
                // 3. Spostiamo la penna di disegno all'esterno della sfera (Raggio della terra + altitudine)
                translate(0, 0, RAGGIO_TERRA + 30); 
                
                // Disegniamo la ISS (Un rettangolino/box)
                fill(255, 50, 50); // Colore rosso acceso per contrasto
                stroke(255); // Bordo bianco
                box(12, 6, 12); // Rettangolo (Larghezza, Altezza, Profondità)
                pop();
            }
        }

        // Adatta il canvas se la finestra viene ridimensionata
        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }

        // Funzione per prendere i dati in formato JSON
        async function fetchISS() {
            try {
                // Eseguiamo la fetch al link fornito
                let response = await fetch('http://api.open-notify.org/iss-now.json');
                let data = await response.json();
                issData = data;
            } catch (error) {
                console.error("Impossibile recuperare i dati:", error);
                document.getElementById('lat').innerText = "Errore di connessione";
                document.getElementById('lon').innerText = "Errore di connessione";
            }
        }
    </script>
</body>
</html>
